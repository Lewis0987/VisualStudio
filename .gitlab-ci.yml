stages:
  - build

build_dx01:
  stage: build
  tags:
    - windows

  script:
    - cd DX01_ShortCircuitTester
    - dotnet restore DX01_ShortCircuitTester.sln
    - .\build.bat

  artifacts:
    when: always
    paths:
      - DX01_ShortCircuitTester/DX01_ShortCircuitTester/bin/
      - DX01_ShortCircuitTester/DX01_StressTester/bin/
    expire_in: 7 days
