# 只允許手動執行 Pipeline
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"' 
      when: always                       # 只有從 GitLab 網頁按 Run pipeline 才執行
    - when: never                        # 其他觸發方式（Push、Merge、Schedule...）全部不執行

stages:
  - prepare
  - build

get_version:
  stage: prepare
  tags:
    - windows
  script:
    - |
      $xml = [xml](Get-Content ".\DX01_ShortCircuitTester\DX01_ShortCircuitTester\DX01_ShortCircuitTester.csproj")
      $version = $xml.Project.PropertyGroup.Version
      "DX01_VERSION=V$version" | Out-File version.env -Encoding ascii
      Get-Content version.env
  artifacts:
    reports:
      dotenv: version.env

build:
  stage: build
  tags:
    - windows
  needs:
    - job: get_version
      artifacts: true
  script:
    - Write-Host "DX01_VERSION=$env:DX01_VERSION"
    - |
      $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
      $msbuild = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe
      Write-Host "MSBuild=$msbuild"
      & $msbuild ".\DX01_ShortCircuitTester\DX01_ShortCircuitTester.sln" /restore /p:Configuration=Release
  artifacts:
    name: "DTX01_${DX01_VERSION}"
    paths:
      - DX01_ShortCircuitTester/**/bin/Release/net48/
    expire_in: 7 days