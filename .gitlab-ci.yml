stages:
  - prepare
  - build

get_version:
  stage: prepare
  tags:
    - windows
  script:
    - |
      $xml = [xml](Get-Content ".\DX01_ShortCircuitTester\DX01_ShortCircuitTester.csproj")
      $version = $xml.Project.PropertyGroup.Version
      "DX01_VERSION=V$version" | Out-File version.env -Encoding ascii
      Get-Content version.env
  artifacts:
    reports:
      dotenv: version.env

build:
  stage: build
  tags:
    - windows
  needs:
    - job: get_version
      artifacts: true
  script:
    - echo DX01_VERSION=%DX01_VERSION%
    - nuget restore DX01_ShortCircuitTester.sln
    - msbuild DX01_ShortCircuitTester.sln /p:Configuration=Release
  artifacts:
    name: "DTX01_${DX01_VERSION}"
    paths:
      - DX01_ShortCircuitTester/bin/Release/
    expire_in: 7 days