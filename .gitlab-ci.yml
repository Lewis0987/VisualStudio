stages:
  - prepare
  - build

get_version:
  stage: prepare
  tags:
    - windows
  script:
    - powershell -Command "$xml=[xml](Get-Content 'DX01_ShortCircuitTester.csproj'); $v=$xml.Project.PropertyGroup.Version; 'DX01_VERSION=V' + $v | Out-File version.env -Encoding ascii"
  artifacts:
    reports:
      dotenv: version.env

build:
  stage: build
  tags:
    - windows
  needs:
    - job: get_version
      artifacts: true
  script:
    - echo DX01 Version = %DX01_VERSION%
    - nuget restore DX01_ShortCircuitTester.sln
    - msbuild DX01_ShortCircuitTester.sln /p:Configuration=Release
  artifacts:
    name: "DX01_${DX01_VERSION}"
    paths:
      - bin/Release/
    expire_in: 7 days